name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      # Host provisioning (Task 1.0 / #16): create the two runtime identities, the
      # agent UID, atlas-git group, per-identity keys, WORM anchor, sockets, install
      # dir + sudoers drop-in. Both runners have passwordless sudo. CI always
      # provisions, so ATLAS_PROVISIONED-gated suites never skip here.
      - name: Provision host
        run: sudo -E provisioning/ci/setup.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test
        env:
          ATLAS_PROVISIONED: "1"

      - name: CLI-contract determinism (--check clean)
        run: node tools/gen-cli-contract.ts --check
