name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      # Zero-provisioning cutover (phase-2-in-process-cutover, #312): CI no longer
      # provisions the two-UID / daemon / key-custody host layout. The suite runs
      # daemon-free in-process; ATLAS_PROVISIONED is unset, so provisioning-gated
      # suites cleanly subset (run their in-process subset) rather than hard-fail.
      # The ubuntu-latest + macos-15 matrix is retained purely as a portability
      # canary for the platform-neutral suite. (Provisioned-only suites are deleted,
      # not skipped, in Phase 3.)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: CLI-contract determinism (--check clean)
        run: node tools/gen-cli-contract.ts --check
