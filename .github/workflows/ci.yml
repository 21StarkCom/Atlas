name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      # NOTE: the host-provisioning step (`sudo provisioning/ci/setup.sh` +
      # ATLAS_PROVISIONED=1) is added by Task 1.0 — see the implementation plan.
      # Phase 0 has no provisioning dependency.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm -r test

      - name: CLI-contract determinism (--check clean)
        run: node tools/gen-cli-contract.ts --check
