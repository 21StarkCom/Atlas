# Atlas agent per-UID pf anchor (macOS) — Task 1.0 / #16, D17.
# Denies ALL outbound network for the atlas-agent UID, unconditionally, so a direct
# `node`/`curl` from the agent has no route even without going through a launcher.
# Only atlas-egress retains outbound. Loaded into a named anchor:
#
#   sudo pfctl -a atlas/agent -f provisioning/macos/agent-pf.conf
#   sudo pfctl -e            # ensure pf is enabled
#
# NOTE: substitute <AGENT_UID> with the provisioned atlas-agent UID (setup.sh prints
# it; `id -u atlas-agent`). pf user rules match the effective UID of the socket owner.
block drop out proto { tcp udp } from any to any user <AGENT_UID>
# (egress identity is unaffected; the broker/agent still reach their local unix sockets,
#  which are not subject to these IP-layer rules.)
